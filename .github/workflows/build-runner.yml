name: Build & Push Runner

on:
  push:
    paths:
      - "runner/Dockerfile"
      - "runner/authorized_keys"
      - "runner/build-job.yaml"
      - ".github/workflows/build-runner.yml"
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default: auto from SHA)"
        required: false
        default: ""

# Necesario para pushear el manifest actualizado al repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          OVERRIDE="${{ github.event.inputs.tag }}"
          if [ -n "$OVERRIDE" ]; then
            SPECIFIC_TAG="$OVERRIDE"
          else
            SPECIFIC_TAG="runner-${SHORT_SHA}"
          fi
          echo "specific_tag=${SPECIFIC_TAG}" >> $GITHUB_OUTPUT
          echo "tags=silencfox/openclaw:${SPECIFIC_TAG},silencfox/openclaw:runner" >> $GITHUB_OUTPUT
          echo "Built tag: ${SPECIFIC_TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runner
          file: ./runner/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps manifest
        run: |
          SPECIFIC_TAG="${{ steps.meta.outputs.specific_tag }}"
          DEPLOY_FILE="runner/k8s/deployment.yaml"

          echo "Updating $DEPLOY_FILE with tag: $SPECIFIC_TAG"

          # Update image tag in the deployment manifest
          sed -i "s|image: silencfox/openclaw:runner.*|image: silencfox/openclaw:${SPECIFIC_TAG}|" "$DEPLOY_FILE"

          # Show the change
          grep "image: silencfox/openclaw" "$DEPLOY_FILE"

      - name: Commit and push GitOps update
        run: |
          git config user.name "Runner Builder Bot"
          git config user.email "bot@openclaw.local"

          git add runner/k8s/deployment.yaml

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(runner): update image tag to ${{ steps.meta.outputs.specific_tag }} [ci skip]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Push Runner

on:
  push:
    paths:
      - "runner/Dockerfile"
      - "runner/authorized_keys"
      - "runner/**"
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de la imagen (default: runner)"
        required: false
        default: "runner"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || 'runner' }}"
          echo "tags=silencfox/openclaw:${TAG},silencfox/openclaw:runner" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runner
          file: ./runner/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: runner
  name: runner
  namespace: openclaw
spec:
  replicas: 1

  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: runner

  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app: runner
    spec:
      containers:
        - name: runner
          image: silencfox/openclaw:runner
          imagePullPolicy: Always

          env:
            - name: TZ
              value: America/Santo_Domingo
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock

          ports:
            - containerPort: 22
              name: ssh
              protocol: TCP

          readinessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 20
            periodSeconds: 15

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock

            - name: runner-workdir
              mountPath: /workspace

            - name: runner-home
              mountPath: /home/runner

            - name: ssh-keys
              mountPath: /home/runner/.ssh
              readOnly: true

            - name: openclaw-data
              mountPath: /opt/openclaw
              readOnly: true

      dnsPolicy: ClusterFirst

      nodeName: rasppi516

      volumes:
        - name: docker-socket
          hostPath:
            path: /run/user/1000/docker.sock
            type: Socket

        - name: runner-workdir
          hostPath:
            path: /opt/openclaw/runner-workdir-alpine
            type: Directory

        - name: runner-home
          hostPath:
            path: /opt/openclaw/runner-home-alpine
            type: Directory

        - name: ssh-keys
          secret:
            secretName: openclaw-ssh-keys
            defaultMode: 384

        - name: openclaw-data
          hostPath:
            path: /opt/openclaw
            type: Directory
